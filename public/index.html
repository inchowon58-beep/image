<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Folders</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1f1a17;
      --muted: #6f655d;
      --accent: #8b5e3c;
      --border: #e4ddd4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      margin: 0;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .folder-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .folder-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--border);
      background: #faf8f5;
    }

    .folder-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex: 1;
    }

    .folder-name {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .folder-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .url-box {
      font-family: Consolas, monospace;
      font-size: 0.82rem;
      background: #faf8f5;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      word-break: break-all;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Image Folders</h1>
    <p class="sub">Vercel에 배포된 이미지 폴더 목록입니다. 각 폴더의 대표 이미지와 주소를 확인할 수 있습니다.</p>
  </header>

  <main>
    <div class="folder-grid" id="folderGrid"></div>
  </main>

  <script>
    const folderGrid = document.getElementById("folderGrid");

    function getFolderUrl(folder) {
      return `${window.location.origin}/${folder}/`;
    }

    async function copyText(text, button) {
      await navigator.clipboard.writeText(text);
      const original = button.textContent;
      button.textContent = "복사됨!";
      setTimeout(() => {
        button.textContent = original;
      }, 1500);
    }

    function renderFolderCard(item) {
      const folderUrl = getFolderUrl(item.folder);
      const card = document.createElement("article");
      card.className = "folder-card";
      card.innerHTML = `
        <img src="${item.sample}" alt="${item.folder} sample" loading="lazy" />
        <div class="folder-body">
          <div>
            <h2 class="folder-name">/${item.folder}</h2>
            <p class="folder-meta">${item.count}장 · ${item.format}</p>
          </div>
          <div class="url-box">${folderUrl}</div>
          <button type="button" class="primary copy-btn">폴더 주소 복사</button>
        </div>
      `;

      card.querySelector(".copy-btn").addEventListener("click", (event) => {
        copyText(folderUrl, event.currentTarget);
      });

      return card;
    }

    async function renderFolders() {
      try {
        const response = await fetch("/data/folders-index.json");
        const data = await response.json();

        if (!data.folders?.length) {
          folderGrid.innerHTML = '<div class="empty">등록된 폴더가 없습니다.</div>';
          return;
        }

        folderGrid.innerHTML = "";
        data.folders.forEach((item) => {
          folderGrid.appendChild(renderFolderCard(item));
        });
      } catch {
        folderGrid.innerHTML = '<div class="empty">폴더 목록을 불러오지 못했습니다.</div>';
      }
    }

    renderFolders();
  </script>
</body>
</html>
