<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main Coon Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1f1a17;
      --muted: #6f655d;
      --accent: #8b5e3c;
      --border: #e4ddd4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      margin: 0;
    }

    nav {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    a.button, button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      font: inherit;
    }

    button.primary, a.button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .panel h2 {
      margin: 0 0 0.75rem;
      font-size: 1.1rem;
    }

    .random-preview {
      display: grid;
      gap: 1rem;
      align-items: start;
    }

    .random-preview img {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: block;
    }

    .url-box {
      font-family: Consolas, monospace;
      font-size: 0.9rem;
      background: #faf8f5;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .grid a {
      display: block;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      text-decoration: none;
      color: inherit;
    }

    .grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .grid span {
      display: block;
      padding: 0.4rem 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Main Coon Images</h1>
    <p class="sub">Vercel에 배포된 <code>/maincoon</code> 폴더 이미지 (01.webp ~ 59.webp)</p>
    <nav>
      <a class="button primary" href="/write.html">랜덤 이미지로 작성</a>
      <button type="button" id="randomBtn">랜덤 이미지 보기</button>
    </nav>
  </header>

  <main>
    <section class="panel random-preview" id="randomPanel">
      <div>
        <h2>대표 이미지</h2>
        <img id="randomImg" src="/maincoon/01.webp" alt="01.webp" />
        <div class="actions">
          <button type="button" class="primary" id="anotherBtn">다른 이미지</button>
          <button type="button" id="copyBtn">URL 복사</button>
        </div>
      </div>
      <div>
        <h2>이미지 URL</h2>
        <div class="url-box" id="randomUrl">/maincoon/01.webp</div>
      </div>
    </section>

    <section class="panel">
      <h2>전체 갤러리 (<span id="count">0</span>장)</h2>
      <div class="grid" id="gallery"></div>
    </section>
  </main>

  <script src="/js/maincoon.js"></script>
  <script>
    const randomPanel = document.getElementById("randomPanel");
    const randomImg = document.getElementById("randomImg");
    const randomUrl = document.getElementById("randomUrl");
    const gallery = document.getElementById("gallery");
    const countEl = document.getElementById("count");

    let currentRandom = {
      filename: "01.webp",
      path: "/maincoon/01.webp",
      url: `${window.location.origin}/maincoon/01.webp`,
      folder: "maincoon",
    };

    function showImage(image) {
      if (!image) return;

      currentRandom = image;
      randomPanel.hidden = false;
      randomImg.src = image.path;
      randomImg.alt = image.filename;
      randomUrl.textContent = image.url;
    }

    async function showFirstImage() {
      const images = await MaincoonImages.getAllImageUrls();
      if (images[0]) {
        showImage(images[0]);
      }
    }

    async function showRandom() {
      const image = await MaincoonImages.getRandomImage();
      showImage(image);
    }

    async function renderGallery() {
      const images = await MaincoonImages.getAllImageUrls();
      countEl.textContent = images.length;
      gallery.innerHTML = images
        .map(
          (img) => `
            <a href="${img.url}" target="_blank" rel="noopener">
              <img src="${img.path}" alt="${img.filename}" loading="lazy" />
              <span>${img.filename}</span>
            </a>
          `
        )
        .join("");
    }

    document.getElementById("randomBtn").addEventListener("click", showRandom);
    document.getElementById("anotherBtn").addEventListener("click", showRandom);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!currentRandom) return;
      await navigator.clipboard.writeText(currentRandom.url);
      document.getElementById("copyBtn").textContent = "복사됨!";
      setTimeout(() => {
        document.getElementById("copyBtn").textContent = "URL 복사";
      }, 1500);
    });

    showFirstImage();
    renderGallery();
  </script>
</body>
</html>
